<div class="cart-summary">
  <h2>🛒 Items: {{ cartCount }} | Total: ₱{{ totalPrice }}</h2>
</div>

<div class="filter-section">
  <label>Filter:</label>
  <select [(ngModel)]="selectedCategory">
    <option value="All">All</option>
    <option value="Weights">Weights</option>
    <option value="Cardio">Cardio</option>
    <option value="Accessories">Accessories</option>
  </select>
</div>

<div class="products-grid">
  <div class="card" *ngFor="let item of filteredProducts">
    <img [src]="item.image" class="product-img">
    <h3>{{ item.name }}</h3>
    <p>Price: ₱{{ item.price }}</p>

    <p *ngIf="item.available; else outStock" style="color: green;">In Stock</p>
    <ng-template #outStock>
      <p style="color: red;">Out of Stock</p>
    </ng-template>

    <button (click)="addToCart(item)" [disabled]="!item.available">
      Add to Cart
    </button>
  </div>
</div>
